<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            --bg: #f4f6fa;
            --card: #ffffff;
            --text: #1e1e2a;
            --subtext: #4a4a5e;
            --border: #e2e4eb;
            --shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.07), 0 8px 16px -6px rgba(0, 0, 0, 0.05);
            --accent-clan: #2c3e50;
            --accent-ls: #8e44ad;
            --button-bg: #eef0f5;
            --button-text: #1e1e2a;
            background: var(--bg);
            color: var(--text);
        }

        body.dark {
            --bg: #121217;
            --card: #1e1e26;
            --text: #eceef5;
            --subtext: #a9a9bf;
            --border: #2e2e3c;
            --shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.5), 0 8px 16px -6px #00000080;
            --accent-clan: #4b6a8b;
            --accent-ls: #b87ed4;
            --button-bg: #2a2a36;
            --button-text: #dfe3f0;
        }

        .container {
            max-width: 760px;
            width: 100%;
        }

        .theme-toggle {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .theme-btn {
            background: var(--button-bg);
            border: 1px solid var(--border);
            color: var(--button-text);
            padding: 10px 22px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: var(--shadow);
        }

        .theme-btn:hover {
            filter: brightness(1.1);
            border-color: var(--accent-clan);
        }

        .title-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .glitch {
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent-clan), var(--accent-ls));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .subhead {
            color: var(--subtext);
            font-weight: 500;
            font-size: 1.1rem;
            border-bottom: 2px dashed var(--border);
            display: inline-block;
            padding-bottom: 10px;
        }

        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }

        .card {
            flex: 1 1 240px;
            min-width: 220px;
            background: var(--card);
            border-radius: 32px;
            padding: 24px 16px 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
            transform: translateY(0);
            transition: transform 0.25s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 40px -12px rgba(0, 0, 0, 0.2);
            border-color: var(--accent-clan);
        }

        .card-image {
            width: 150px;
            height: 150px;
            margin: 0 auto 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--border);
            transition: all 0.2s;
            overflow: hidden;
            background: var(--button-bg);
        }

        .card:hover .card-image {
            border-color: var(--accent-clan);
            transform: scale(1.02);
        }

        .card.ls-card:hover .card-image {
            border-color: var(--accent-ls);
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .card-desc {
            color: var(--subtext);
            font-weight: 500;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button class="theme-btn" id="themeSwitch">тема</button>
        </div>

        <div class="title-section">
            <div class="glitch">//</div>
            <div class="subhead">выбери</div>
        </div>

        <div class="cards-grid">
            <div class="card" id="clanCard">
                <div class="card-image">
                    <img src="IMG_20260418_212204_567.jpg" alt="clan">
                </div>
                <div class="card-title">клан</div>
                <div class="card-desc">открыть</div>
            </div>

            <div class="card ls-card" id="lsCard">
                <div class="card-image">
                    <img src="IMG_20260418_212204_362.jpg" alt="ls">
                </div>
                <div class="card-title">создатель клана</div>
                <div class="card-desc">написать</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const themeBtn = document.getElementById('themeSwitch');
            const body = document.body;

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                body.classList.add('dark');
            }

            themeBtn.addEventListener('click', () => {
                body.classList.toggle('dark');
                const isDark = body.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });

            const clanCard = document.getElementById('clanCard');
            const lsCard = document.getElementById('lsCard');

            clanCard.addEventListener('click', () => {
                window.open('https://t.me/+tS_PYwKZ4F0wYTEy', '_blank');
            });

            lsCard.addEventListener('click', () => {
                window.open('http://t.me/forderx', '_blank');
            });

            clanCard.setAttribute('role', 'button');
            clanCard.setAttribute('tabindex', '0');
            
            lsCard.setAttribute('role', 'button');
            lsCard.setAttribute('tabindex', '0');

            [clanCard, lsCard].forEach(card => {
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        card.click();
                    }
                });
            });

        })();
    </script>
</body>
</html>
